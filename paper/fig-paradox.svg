<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <linearGradient id="collapse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#e74c3c;stop-opacity:0.05"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="white"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#2c3e50">The Voting Ensemble Paradox</text>
  
  <!-- Checkpoints (left side) -->
  <text x="120" y="75" text-anchor="middle" font-family="serif" font-size="14" fill="#7f8c8d">Checkpoints</text>
  
  <!-- v3 -->
  <circle cx="120" cy="130" r="35" fill="#3498db" opacity="0.85"/>
  <text x="120" y="135" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="white">v3</text>
  <text x="120" y="185" text-anchor="middle" font-family="serif" font-size="11" fill="#7f8c8d">0.942</text>
  
  <!-- v4 -->
  <circle cx="120" cy="250" r="35" fill="#2ecc71" opacity="0.85"/>
  <text x="120" y="255" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="white">v4</text>
  <text x="120" y="305" text-anchor="middle" font-family="serif" font-size="11" fill="#7f8c8d">0.967</text>
  
  <!-- v5 -->
  <circle cx="120" cy="345" r="35" fill="#9b59b6" opacity="0.85"/>
  <text x="120" y="350" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="white">v5</text>
  <text x="120" y="395" text-anchor="middle" font-family="serif" font-size="11" fill="#7f8c8d">0.961</text>
  
  <!-- Voting box -->
  <rect x="300" y="160" width="120" height="80" rx="8" fill="#f39c12" opacity="0.9"/>
  <text x="360" y="195" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="white">Majority</text>
  <text x="360" y="215" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="white">k-of-N</text>
  <text x="360" y="235" text-anchor="middle" font-family="serif" font-size="11" fill="white" opacity="0.8">Vote</text>
  
  <!-- Arrows from checkpoints to voting -->
  <line x1="155" y1="130" x2="295" y2="185" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="155" y1="250" x2="295" y2="205" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="155" y1="345" x2="295" y2="225" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Collapse zone -->
  <rect x="490" y="100" width="200" height="200" rx="12" fill="url(#collapse)" stroke="#e74c3c" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="590" y="145" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#c0392b">Collapse Zone</text>
  
  <!-- Result circle (collapsed) -->
  <circle cx="590" cy="200" r="40" fill="#e74c3c" opacity="0.7"/>
  <text x="590" y="195" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="white">0.931</text>
  <text x="590" y="215" text-anchor="middle" font-family="serif" font-size="11" fill="white">ensemble</text>
  
  <!-- Arrow from voting to collapse -->
  <line x1="420" y1="200" x2="485" y2="200" stroke="#e74c3c" stroke-width="2.5" marker-end="url(#arrow)"/>
  
  <!-- Best single model (right side) -->
  <circle cx="720" cy="200" r="35" fill="#27ae60" opacity="0.9"/>
  <text x="720" y="195" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="white">0.967</text>
  <text x="720" y="215" text-anchor="middle" font-family="serif" font-size="11" fill="white">v4 alone</text>
  <text x="720" y="260" text-anchor="middle" font-family="serif" font-size="12" font-weight="bold" fill="#27ae60">Better!</text>
  
  <!-- Dashed comparison line -->
  <line x1="635" y1="200" x2="680" y2="200" stroke="#27ae60" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="660" y="185" text-anchor="middle" font-family="serif" font-size="10" fill="#27ae60">Pareto</text>
  <text x="660" y="195" text-anchor="middle" font-family="serif" font-size="10" fill="#27ae60">dominates</text>
  
  <!-- Caption -->
  <text x="400" y="385" text-anchor="middle" font-family="serif" font-size="11" fill="#95a5a6">Ensemble (0.931) is worse than any single model — the paradox</text>
</svg>
