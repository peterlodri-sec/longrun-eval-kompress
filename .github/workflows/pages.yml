name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths: ['site/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check if Pages is enabled
        id: pages-check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh api repos/${{ github.repository }}/pages >/dev/null 2>&1; then
            echo "enabled=true" >> $GITHUB_OUTPUT
            echo "GitHub Pages is enabled"
          else
            echo "enabled=false" >> $GITHUB_OUTPUT
            echo "::notice::GitHub Pages is not enabled. Enable it in Settings → Pages → Source: GitHub Actions"
          fi
      - name: Setup Pages
        if: steps.pages-check.outputs.enabled == 'true'
        uses: actions/configure-pages@v6
      - name: Upload site/
        if: steps.pages-check.outputs.enabled == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: site
      - name: Deploy to GitHub Pages
        if: steps.pages-check.outputs.enabled == 'true'
        id: deployment
        uses: actions/deploy-pages@v5
