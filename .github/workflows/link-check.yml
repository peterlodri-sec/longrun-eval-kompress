name: Link & Seal Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly: check that external URLs still resolve
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  dns-link-check:
    name: DNS link check (LINKS.txt + paper URLs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Bulk HEAD check (LINKS.txt + paper URLs)
        run: |
          set +e
          BROKEN=0
          CHECKED=0

          # Collect all URLs: from LINKS.txt + paper/*.tex
          URLs=$(grep -o 'https://[^ ]*' LINKS.txt | sort -u)
          URLs="$URLs
          $(grep -oh 'https\?://[^ }\\]*' paper/*.tex | sed 's/[)}].*//' | sort -u)"

          for url in $URLS; do
            [ -z "$url" ] && continue
            CHECKED=$((CHECKED + 1))
            # HEAD request: fast, no body download, 10s timeout, follow redirects
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" -I -L --max-time 10 "$url" 2>/dev/null)
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo "  OK   [$STATUS] $url"
            elif [ "$STATUS" -ge 400 ] && [ "$STATUS" -lt 500 ]; then
              echo "  FAIL [$STATUS] $url"
              BROKEN=$((BROKEN + 1))
            else
              # Timeout/connection error — skip, don't count as broken
              echo "  SKIP [$STATUS] $url"
              CHECKED=$((CHECKED - 1))
            fi
          done

          echo ""
          echo "Checked: $CHECKED URLs (excluding skipped)"
          echo "Broken:  $BROKEN URLs"

          if [ "$CHECKED" -gt 0 ] && [ "$BROKEN" -gt 0 ]; then
            PCT=$((BROKEN * 100 / CHECKED))
            if [ "$PCT" -gt 30 ]; then
              echo "::error::${PCT}% of links are broken (${BROKEN}/${CHECKED})"
              exit 1
            fi
          fi
          echo "Link check passed"

  genesis-seal:
    name: Genesis seal verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify or generate genesis seal
        run: |
          if [ -f .genesis_seal.json ]; then
            python tools/genesis_seal.py --verify || {
              echo "::warning::Genesis seal mismatch. Regenerating for current state."
              python tools/genesis_seal.py
              echo "::notice::Seal regenerated. The new seal should be committed."
            }
          else
            echo "::notice::No genesis seal found. Generating one."
            python tools/genesis_seal.py
          fi
