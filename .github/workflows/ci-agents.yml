name: CI Agents

on:
  push:
    branches: [main]
    paths:
      - 'paper/**'
      - 'baselines/**'
      - 'agents/**'
      - 'LINKS.md'
      - '**/*.md'
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # weekly Monday 6am UTC
  workflow_dispatch:

continue-on-error: true

jobs:
  latex-guard:
    name: LaTeX Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install latexmk texlive-full
      - run: python tools/ci_agents.py run latex-guard

  citation-guard:
    name: Citation Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python tools/ci_agents.py run citation-guard

  metric-watchdog:
    name: Metric Watchdog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2  # need HEAD~1 for comparison
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python tools/ci_agents.py run metric-watchdog

  changelog-gen:
    name: Changelog Gen
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python tools/ci_agents.py run changelog-gen
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if ! git diff --cached --quiet; then
            git commit -m "docs: auto-generate changelog [skip ci]" --no-verify
            git push
          fi

  hf-card-sync:
    name: HF Card Sync
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python tools/ci_agents.py run hf-card-sync

  linker:
    name: Link Checker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python tools/ci_agents.py run linker

  todo-scanner:
    name: Todo Scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python tools/ci_agents.py run todo-scanner

  secret-scanner:
    name: Secret Scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python tools/ci_agents.py run secret-scanner
