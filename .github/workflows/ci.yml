name: kompress-eval CI
on: [push, pull_request]
jobs:
  citation-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python ci/citation_guard.py
  metric-watchdog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python ci/metric_watchdog.py
  baselines:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install nltk && python baselines/run_baselines.py --baseline textrank
      - run: python baselines/run_baselines.py --baseline random
