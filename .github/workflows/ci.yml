name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  latex-check:
    name: LaTeX environment balance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check begin/end balance
        run: |
          cd paper
          EXIT=0
          for env in theorem proof corollary definition remark abstract document itemize table algorithm; do
            b=$(grep -c "\\\\begin{$env}" *.tex 2>/dev/null | awk -F: '{s+=$2} END{print s+0}')
            e=$(grep -c "\\\\end{$env}" *.tex 2>/dev/null | awk -F: '{s+=$2} END{print s+0}')
            if [ "$b" != "$e" ]; then
              echo "::error::$env: begin=$b end=$e MISMATCH"
              EXIT=1
            else
              echo "$env: begin=$b end=$e OK"
            fi
          done
          exit $EXIT

  todo-check:
    name: No TODOs or placeholders
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for TODOs
        run: |
          if grep -rn "TODO" paper/*.tex 2>/dev/null; then
            echo "::error::Found TODO markers in manuscript"
            exit 1
          fi
          echo "No TODOs found"
      - name: Check for TBD placeholders
        run: |
          if grep -rn "\\\\tbd" paper/*.tex 2>/dev/null; then
            echo "::warning::Found \\tbd placeholders in manuscript (pending data)"
          fi
          echo "TBD check complete"

  citation-check:
    name: Citation verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for unverified citations
        run: |
          if grep -rn "VERIFY" paper/references.bib 2>/dev/null; then
            echo "::warning::Found VERIFY markers in references.bib"
          fi
          echo "Citation check complete"

  python-syntax:
    name: Python syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check syntax
        run: |
          for f in baselines/run_baselines.py mcp_server/server.py notebook.py; do
            python -c "import ast; ast.parse(open('$f').read())" && echo "$f: OK" || exit 1
          done

  agent-readiness:
    name: Agent readiness (AGENTS.md + MCP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check AGENTS.md exists
        run: test -f AGENTS.md && echo "AGENTS.md OK"
      - name: Check MCP server exists
        run: test -f mcp_server/server.py && echo "MCP server OK"
      - name: Check notebook exists
        run: test -f notebook.py && echo "Notebook OK"
      - name: Check README exists
        run: test -f README.md && echo "README OK"
      - name: Check LINKS.txt exists
        run: test -f LINKS.txt && echo "LINKS.txt OK"
      - name: Check LICENSE exists
        run: test -f LICENSE && echo "LICENSE OK"
