<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#05060a"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg2)"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="monospace" font-size="22" fill="#62e6c9" letter-spacing="4">PARETO FRONTIER: WEIGHT vs PRECISION</text>
  
  <!-- Axes -->
  <line x1="80" y1="400" x2="700" y2="400" stroke="#9a93b8" stroke-width="1" opacity="0.4"/>
  <line x1="80" y1="80" x2="80" y2="400" stroke="#9a93b8" stroke-width="1" opacity="0.4"/>
  
  <!-- Axis labels -->
  <text x="400" y="440" text-anchor="middle" font-family="monospace" font-size="12" fill="#9a93b8">Must-Keep Loss Weight (λ)</text>
  <text x="30" y="240" text-anchor="middle" font-family="monospace" font-size="12" fill="#9a93b8" transform="rotate(-90,30,240)">Heretic Exact</text>
  
  <!-- Grid -->
  <line x1="80" y1="320" x2="700" y2="320" stroke="#9a93b8" stroke-width="0.5" opacity="0.15"/>
  <line x1="80" y1="240" x2="700" y2="240" stroke="#9a93b8" stroke-width="0.5" opacity="0.15"/>
  <line x1="80" y1="160" x2="700" y2="160" stroke="#9a93b8" stroke-width="0.5" opacity="0.15"/>
  
  <!-- Data points -->
  <!-- v8: 3x, 0.955 -->
  <circle cx="390" cy="220" r="10" fill="#62e6c9" opacity="0.9"/>
  <text x="390" y="205" text-anchor="middle" font-family="monospace" font-size="11" fill="#62e6c9">v8 ★</text>
  <text x="390" y="435" text-anchor="middle" font-family="monospace" font-size="10" fill="#9a93b8">3×</text>
  
  <!-- v17: 5x, 0.963 -->
  <circle cx="505" cy="200" r="7" fill="#b48bff" opacity="0.7"/>
  <text x="505" y="185" text-anchor="middle" font-family="monospace" font-size="10" fill="#b48bff">v17</text>
  <text x="505" y="435" text-anchor="middle" font-family="monospace" font-size="10" fill="#9a93b8">5×</text>
  
  <!-- v16: 10x, 0.972 -->
  <circle cx="620" cy="175" r="7" fill="#ff9ad5" opacity="0.7"/>
  <text x="620" y="160" text-anchor="middle" font-family="monospace" font-size="10" fill="#ff9ad5">v16</text>
  <text x="620" y="435" text-anchor="middle" font-family="monospace" font-size="10" fill="#9a93b8">10×</text>
  
  <!-- Pareto curve -->
  <path d="M390,220 Q450,210 505,200 Q560,188 620,175" fill="none" stroke="#62e6c9" stroke-width="2" stroke-dasharray="6,3" opacity="0.6"/>
  
  <!-- Compression labels -->
  <text x="390" y="250" text-anchor="middle" font-family="monospace" font-size="10" fill="#f7768e">15% compression</text>
  <text x="505" y="230" text-anchor="middle" font-family="monospace" font-size="10" fill="#f7768e">3.7%</text>
  <text x="620" y="205" text-anchor="middle" font-family="monospace" font-size="10" fill="#f7768e">2.8%</text>
  
  <!-- Y-axis ticks -->
  <text x="70" y="324" text-anchor="end" font-family="monospace" font-size="10" fill="#9a93b8">0.90</text>
  <text x="70" y="244" text-anchor="end" font-family="monospace" font-size="10" fill="#9a93b8">0.94</text>
  <text x="70" y="164" text-anchor="end" font-family="monospace" font-size="10" fill="#9a93b8">0.98</text>
</svg>
