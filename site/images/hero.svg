  <circle cx="600" cy="280" r="160" fill="none" stroke="#b48bff" stroke-width="0.5" opacity="0.12"/>
  <circle cx="600" cy="280" r="120" fill="none" stroke="#62e6c9" stroke-width="0.5" opacity="0.15"/>
  <circle cx="600" cy="280" r="80" fill="none" stroke="#62e6c9" stroke-width="0.5" opacity="0.2"/>
  
  <!-- Dodecahedron ASCII art -->
  <text x="600" y="250" text-anchor="middle" font-family="monospace" font-size="14" fill="#62e6c9" opacity="0.6" filter="url(#glow)">
    <tspan x="600" dy="0">   ╭──────╮    ╭──────╮</tspan>
    <tspan x="600" dy="16">  ╱ ╲    ╱ ╲  ╱ ╲    ╱ ╲</tspan>
    <tspan x="600" dy="16"> ╱   ╲  ╱   ╲╱   ╲  ╱   ╲</tspan>
    <tspan x="600" dy="16">╱     ╲╱     ╲     ╲╱     ╲</tspan>
    <tspan x="600" dy="16">╲     ╱╲     ╱     ╱╲     ╱</tspan>
    <tspan x="600" dy="16"> ╲   ╱  ╲   ╱╲   ╱  ╲   ╱</tspan>
    <tspan x="600" dy="16">  ╲ ╱    ╲ ╱  ╲ ╱    ╲ ╱</tspan>
    <tspan x="600" dy="16">   ╰──────╯    ╰──────╯</tspan>
  </text>
  
  <!-- Title -->
  <text x="600" y="420" text-anchor="middle" font-family="monospace" font-size="52" font-weight="bold" fill="url(#title)" filter="url(#glow)" letter-spacing="8">kompress ∞</text>
  
  <!-- Subtitle -->
  <text x="600" y="470" text-anchor="middle" font-family="monospace" font-size="18" fill="#9a93b8" letter-spacing="4">17 MODELS · $38.95 · ONE PARADOX</text>
  
  <!-- Bottom bar -->
  <text x="600" y="520" text-anchor="middle" font-family="monospace" font-size="12" fill="#62e6c9" opacity="0.6">ICLR 2027 · OPEN SCIENCE · HUGGINGFACE</text>
  
  <!-- Dots decoration -->
  <circle cx="300" cy="150" r="2" fill="#b48bff" opacity="0.4"/>
  <circle cx="900" cy="180" r="2" fill="#62e6c9" opacity="0.4"/>
  <circle cx="200" cy="400" r="2" fill="#ff9ad5" opacity="0.3"/>
  <circle cx="1000" cy="350" r="2" fill="#b48bff" opacity="0.3"/>
</svg>
