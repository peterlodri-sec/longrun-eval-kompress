<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#05060a"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg3)"/>
  
  <text x="400" y="35" text-anchor="middle" font-family="monospace" font-size="20" fill="#62e6c9" letter-spacing="3">VOTING ENSEMBLE PARADOX</text>
  
  <!-- Voter boxes -->
  <rect x="60" y="80" width="200" height="60" rx="8" fill="none" stroke="#b48bff" stroke-width="1.5" opacity="0.6"/>
  <text x="160" y="105" text-anchor="middle" font-family="monospace" font-size="14" fill="#b48bff">Voter A (v3)</text>
  <text x="160" y="125" text-anchor="middle" font-family="monospace" font-size="24" fill="#62e6c9">0.967</text>
  
  <rect x="300" y="80" width="200" height="60" rx="8" fill="none" stroke="#b48bff" stroke-width="1.5" opacity="0.6"/>
  <text x="400" y="105" text-anchor="middle" font-family="monospace" font-size="14" fill="#b48bff">Voter B (v3.1)</text>
  <text x="400" y="125" text-anchor="middle" font-family="monospace" font-size="24" fill="#62e6c9">0.942</text>
  
  <rect x="540" y="80" width="200" height="60" rx="8" fill="none" stroke="#b48bff" stroke-width="1.5" opacity="0.6"/>
  <text x="640" y="105" text-anchor="middle" font-family="monospace" font-size="14" fill="#b48bff">Voter C (v3.2)</text>
  <text x="640" y="125" text-anchor="middle" font-family="monospace" font-size="24" fill="#62e6c9">0.929</text>
  
  <!-- Arrows converging -->
  <line x1="160" y1="155" x2="350" y2="230" stroke="#9a93b8" stroke-width="1" opacity="0.4"/>
  <line x1="400" y1="155" x2="400" y2="230" stroke="#9a93b8" stroke-width="1" opacity="0.4"/>
  <line x1="640" y1="155" x2="450" y2="230" stroke="#9a93b8" stroke-width="1" opacity="0.4"/>
  
  <!-- Ensemble box -->
  <rect x="250" y="240" width="300" height="80" rx="10" fill="rgba(247,118,142,.08)" stroke="#f7768e" stroke-width="2"/>
  <text x="400" y="270" text-anchor="middle" font-family="monospace" font-size="14" fill="#f7768e">ENSEMBLE (k=2, N=3)</text>
  <text x="400" y="300" text-anchor="middle" font-family="monospace" font-size="28" fill="#f7768e" font-weight="bold">0.929 ⚠</text>
  
  <!-- Arrow to conclusion -->
  <line x1="400" y1="325" x2="400" y2="360" stroke="#f7768e" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Conclusion -->
  <text x="400" y="380" text-anchor="middle" font-family="monospace" font-size="13" fill="#ffcf7a">ensemble ≤ weakest voter — paradox active</text>
  <text x="400" y="395" text-anchor="middle" font-family="monospace" font-size="11" fill="#9a93b8">fix: 3.0× asymmetric loss modulation on critical tokens</text>
</svg>
